# ci_cd.yml
# GitHub Actions pipeline for Heart Disease MLOps project
# Runs on every push and PR to main branch

name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Job 1: Lint & Code Quality ───────────────────────────────────────────
  lint:
    name: Linting Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 linting
        run: |
          flake8 src/ app/ tests/ \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --count

  # ─── Job 2: Unit Tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/test_pipeline.py -v --tb=short

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ─── Job 3: Model Training ─────────────────────────────────────────────────
  train-model:
    name: Train ML Model
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: python data/download_data.py

      - name: Run training pipeline
        run: python src/train.py

      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/

  # ─── Job 4: Docker Build ───────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train-model

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Build Docker image
        run: |
          docker build -t heart-disease-api:latest .

      - name: Test Docker container runs
        run: |
          docker run -d -p 8000:8000 --name tTestContainer heart-disease-api:latest
          sleep 5
          curl --fail http://localhost:8000/health || exit 1
          docker stop tTestContainer